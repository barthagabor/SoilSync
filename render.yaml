services:
  - type: web
    name: soilsync-backend
    runtime: docker
    plan: free
    dockerContext: ./Backend
    dockerfilePath: ./Backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: FRONTEND_URL
        value: ""
      - key: BACKEND_PUBLIC_URL
        value: ""
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "false"
      - key: EMAIL_PROVIDER
        value: resend
      - key: EMAIL_FROM
        value: ""
      - key: RESEND_API_KEY
        value: ""
      - key: EMAIL_REPLY_TO
        value: ""
      - key: GOOGLE_API_KEY
        value: ""
      - key: GEMINI_API_KEY
        value: ""
      - key: GOOGLE_GENAI_API_VERSION
        value: ""
      - key: PREMIUM_ASSISTANT_MODEL
        value: gemini-2.5-pro
      - key: GARDEN_SVG_MODEL
        value: gemini-2.5-flash
      - key: PLANNER_IMAGE_MODEL
        value: gemini-3.1-flash-image-preview
      - key: CLOUDINARY_CLOUD_NAME
        value: ""
      - key: CLOUDINARY_API_KEY
        value: ""
      - key: CLOUDINARY_API_SECRET
        value: ""
      - key: EPPO_API_KEY
        value: ""
      - key: EPPO_BASE_URL
        value: https://api.eppo.int/gd/v2
